name: Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  DOCKER_IMAGE_NAME: chatsaas-backend
  DEPLOY_PATH: /var/www/chatsaas

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./backend
        run: |
          COMMIT_SHA=${{ inputs.commit_sha || github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          
          docker build \
            -t ${{ env.DOCKER_IMAGE_NAME }}:${SHORT_SHA} \
            -t ${{ env.DOCKER_IMAGE_NAME }}:latest \
            --build-arg COMMIT_SHA=${COMMIT_SHA} \
            .
          
          # Save image to tar file for transfer
          docker save ${{ env.DOCKER_IMAGE_NAME }}:${SHORT_SHA} | gzip > /tmp/docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://api.parthavpovil.in
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Docker image to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            /tmp/docker-image.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Transfer deployment files
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            backend/docker-compose.prod.yml \
            backend/chatsaas-backend.service \
            backend/init-db.sql \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Create deployment script
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e

          # Configuration
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          DOCKER_IMAGE="${{ env.DOCKER_IMAGE_NAME }}"
          COMMIT_SHA="${{ inputs.commit_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          
          echo "=========================================="
          echo "ChatSaaS Backend Deployment"
          echo "Commit: ${COMMIT_SHA}"
          echo "Time: $(date)"
          echo "=========================================="
          
          # Create deployment directory if it doesn't exist
          sudo mkdir -p ${DEPLOY_PATH}
          sudo chown ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} ${DEPLOY_PATH}
          
          # Load Docker image
          echo "Loading Docker image..."
          gunzip -c /tmp/docker-image.tar.gz | docker load
          
          # Tag image
          docker tag ${DOCKER_IMAGE}:${SHORT_SHA} ${DOCKER_IMAGE}:latest
          
          # Move deployment files
          sudo cp /tmp/docker-compose.prod.yml ${DEPLOY_PATH}/
          # Remove stale directory if Docker previously created it in place of the file
          [ -d "${DEPLOY_PATH}/init-db.sql" ] && sudo rm -rf "${DEPLOY_PATH}/init-db.sql"
          sudo cp /tmp/init-db.sql ${DEPLOY_PATH}/
          sudo cp /tmp/chatsaas-backend.service /etc/systemd/system/
          
          # Create .env file from secrets
          cat > ${DEPLOY_PATH}/.env << 'ENV_FILE'
          # Database (PostgreSQL in Docker)
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          
          # JWT Authentication
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_MINUTES=10080
          
          # Security
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          PROCESS_SECRET=${{ secrets.PROCESS_SECRET }}

          # AI Providers
          AI_PROVIDER=openai
          EMBEDDING_PROVIDER=openai
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

          # Redis
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          
          # Email
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          
          # Redis URL (constructed from password)
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379/0

          # Webhook Security
          TELEGRAM_SECRET_TOKEN=${{ secrets.TELEGRAM_SECRET_TOKEN }}
          WHATSAPP_APP_SECRET=${{ secrets.WHATSAPP_APP_SECRET }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          META_VERIFY_TOKEN=${{ secrets.META_VERIFY_TOKEN }}
          
          # Storage
          STORAGE_PATH=/var/chatsaas/storage
          R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_DOMAIN=${{ secrets.R2_PUBLIC_DOMAIN }}
          
          # Razorpay Billing
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          RAZORPAY_PLAN_STARTER=${{ secrets.RAZORPAY_PLAN_STARTER }}
          RAZORPAY_PLAN_GROWTH=${{ secrets.RAZORPAY_PLAN_GROWTH }}
          RAZORPAY_PLAN_PRO=${{ secrets.RAZORPAY_PLAN_PRO }}

          # Administration
          SUPER_ADMIN_EMAIL=${{ secrets.SUPER_ADMIN_EMAIL }}
          
          # Application
          DEBUG=false
          ENVIRONMENT=production
          APP_URL=${{ secrets.APP_URL }}
          COMMIT_SHA=${COMMIT_SHA}
          ENV_FILE
          
          chmod 600 ${DEPLOY_PATH}/.env
          
          # Create storage directory
          sudo mkdir -p /var/chatsaas/storage
          sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /var/chatsaas
          
          # Navigate to deployment directory
          cd ${DEPLOY_PATH}
          
          # Run database migrations
          echo "Running database migrations..."
          docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head || {
            echo "Migration failed! Aborting deployment."
            exit 1
          }

          # Deploy with zero-downtime strategy
          echo "Starting new container..."
          docker compose -f docker-compose.prod.yml up -d --no-deps backend

          # Wait for backend container to be healthy
          echo "Waiting for container to be healthy..."
          for i in {1..45}; do
            HEALTH=$(docker inspect chatsaas-backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
            if [ "$HEALTH" = "healthy" ]; then
              echo "Container is healthy!"
              break
            fi
            if [ $i -eq 45 ]; then
              echo "Container failed to become healthy. Rolling back..."
              docker compose -f docker-compose.prod.yml stop backend
              exit 1
            fi
            echo "Waiting... ($i/45) [status: $HEALTH]"
            sleep 4
          done
          
          # Health check
          echo "Performing health check..."
          for i in {1..3}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed!"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Health check failed after 3 attempts. Rolling back..."
              docker compose -f docker-compose.prod.yml stop backend
              exit 1
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          
          # Reload nginx
          echo "Reloading nginx..."
          sudo nginx -t && sudo systemctl reload nginx
          
          # Clean up old images (keep last 3)
          echo "Cleaning up old Docker images..."
          docker images ${DOCKER_IMAGE} --format "{{.ID}} {{.Tag}}" | \
            grep -v "latest" | \
            tail -n +4 | \
            awk '{print $1}' | \
            xargs -r docker rmi -f || true
          
          # Clean up
          rm -f /tmp/docker-image.tar.gz
          rm -f /tmp/docker-compose.prod.yml
          rm -f /tmp/init-db.sql
          rm -f /tmp/chatsaas-backend.service
          
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "Commit: ${COMMIT_SHA}"
          echo "Time: $(date)"
          echo "=========================================="
          DEPLOY_SCRIPT
          
          chmod +x /tmp/deploy.sh

      - name: Transfer and execute deployment script
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            /tmp/deploy.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/
          
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash /tmp/deploy.sh'

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."

          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in {1..5}; do
              if curl -f http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ Deployment verified successfully!"
                exit 0
              fi
              echo "Verification attempt $i failed, retrying..."
              sleep 5
            done
            echo "❌ Deployment verification failed"
            exit 1'

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.ssh/known_hosts

      - name: Create deployment summary
        if: always()
        env:
          # Pass the commit message via env var so its content is treated as
          # data, not interpolated into the script source. Without this, any
          # multi-line commit message containing quotes / parens / lines that
          # look like commands breaks the step (e.g. "I: command not found").
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_SHA=${{ inputs.commit_sha || github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}

          {
            echo "## Deployment Summary"
            echo ""
            echo "- **Commit:** ${SHORT_SHA}"
            echo "- **Branch:** ${{ github.ref_name }}"
            echo "- **Status:** ${{ job.status }}"
            echo "- **Time:** $(date)"
            echo "- **Triggered by:** ${{ github.actor }}"
            echo ""
            echo "### Commit Message"
            echo ""
            echo '```'
            printf '%s\n' "$COMMIT_MSG"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Success Notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment succeeded!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Deployment Failure Notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          exit 1
