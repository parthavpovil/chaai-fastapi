name: Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  DOCKER_IMAGE_NAME: chatsaas-backend
  DEPLOY_PATH: /var/www/chatsaas

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chatsaas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/chatsaas_test
          JWT_SECRET_KEY: test_secret_key_for_ci_pipeline_testing_only
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest tests/ -v --tb=short --maxfail=5

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./backend
        run: |
          COMMIT_SHA=${{ inputs.commit_sha || github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          
          docker build \
            -t ${{ env.DOCKER_IMAGE_NAME }}:${SHORT_SHA} \
            -t ${{ env.DOCKER_IMAGE_NAME }}:latest \
            --build-arg COMMIT_SHA=${COMMIT_SHA} \
            .
          
          # Save image to tar file for transfer
          docker save ${{ env.DOCKER_IMAGE_NAME }}:${SHORT_SHA} | gzip > /tmp/docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar.gz
          retention-days: 7

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://api.parthavpovil.in
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Docker image to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            /tmp/docker-image.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Transfer deployment files
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            backend/docker-compose.prod.yml \
            backend/nginx.conf \
            backend/chatsaas-backend.service \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Create deployment script
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e

          # Configuration
          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          DOCKER_IMAGE="${{ env.DOCKER_IMAGE_NAME }}"
          COMMIT_SHA="${{ inputs.commit_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          
          echo "=========================================="
          echo "ChatSaaS Backend Deployment"
          echo "Commit: ${COMMIT_SHA}"
          echo "Time: $(date)"
          echo "=========================================="
          
          # Create deployment directory if it doesn't exist
          sudo mkdir -p ${DEPLOY_PATH}
          sudo chown ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} ${DEPLOY_PATH}
          
          # Load Docker image
          echo "Loading Docker image..."
          gunzip -c /tmp/docker-image.tar.gz | docker load
          
          # Tag image
          docker tag ${DOCKER_IMAGE}:${SHORT_SHA} ${DOCKER_IMAGE}:latest
          
          # Move deployment files
          sudo cp /tmp/docker-compose.prod.yml ${DEPLOY_PATH}/
          sudo cp /tmp/nginx.conf /etc/nginx/sites-available/chatsaas
          sudo cp /tmp/chatsaas-backend.service /etc/systemd/system/
          
          # Create .env file from secrets
          cat > ${DEPLOY_PATH}/.env << 'ENV_FILE'
          # Database (PostgreSQL in Docker)
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          
          # JWT Authentication
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM=HS256
          JWT_EXPIRE_MINUTES=10080
          
          # Security
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          
          # AI Providers
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DEFAULT_AI_PROVIDER=openai
          
          # Email
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          
          # Webhook Security
          TELEGRAM_SECRET_TOKEN=${{ secrets.TELEGRAM_SECRET_TOKEN }}
          WHATSAPP_APP_SECRET=${{ secrets.WHATSAPP_APP_SECRET }}
          INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}
          
          # Storage
          STORAGE_PATH=/var/chatsaas/storage
          
          # Administration
          SUPER_ADMIN_EMAIL=${{ secrets.SUPER_ADMIN_EMAIL }}
          
          # Application
          DEBUG=false
          ENVIRONMENT=production
          COMMIT_SHA=${COMMIT_SHA}
          ENV_FILE
          
          chmod 600 ${DEPLOY_PATH}/.env
          
          # Create storage directory
          sudo mkdir -p /var/chatsaas/storage
          sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /var/chatsaas
          
          # Navigate to deployment directory
          cd ${DEPLOY_PATH}
          
          # Run database migrations
          echo "Running database migrations..."
          docker-compose -f docker-compose.prod.yml run --rm backend alembic upgrade head || {
            echo "Migration failed! Aborting deployment."
            exit 1
          }
          
          # Deploy with zero-downtime strategy
          echo "Starting new container..."
          docker-compose -f docker-compose.prod.yml up -d --no-deps --build backend
          
          # Wait for container to be healthy
          echo "Waiting for container to be healthy..."
          for i in {1..30}; do
            if docker-compose -f docker-compose.prod.yml ps | grep -q "healthy"; then
              echo "Container is healthy!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Container failed to become healthy. Rolling back..."
              docker-compose -f docker-compose.prod.yml down
              exit 1
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          # Health check
          echo "Performing health check..."
          for i in {1..3}; do
            if curl -f http://localhost:8000/api/metrics/health/detailed > /dev/null 2>&1; then
              echo "Health check passed!"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Health check failed after 3 attempts. Rolling back..."
              docker-compose -f docker-compose.prod.yml down
              exit 1
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          
          # Reload nginx
          echo "Reloading nginx..."
          sudo nginx -t && sudo systemctl reload nginx
          
          # Clean up old images (keep last 3)
          echo "Cleaning up old Docker images..."
          docker images ${DOCKER_IMAGE} --format "{{.ID}} {{.Tag}}" | \
            grep -v "latest" | \
            tail -n +4 | \
            awk '{print $1}' | \
            xargs -r docker rmi -f || true
          
          # Clean up
          rm -f /tmp/docker-image.tar.gz
          rm -f /tmp/docker-compose.prod.yml
          rm -f /tmp/nginx.conf
          rm -f /tmp/chatsaas-backend.service
          
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "Commit: ${COMMIT_SHA}"
          echo "Time: $(date)"
          echo "=========================================="
          DEPLOY_SCRIPT
          
          chmod +x /tmp/deploy.sh

      - name: Transfer and execute deployment script
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            /tmp/deploy.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/
          
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'bash /tmp/deploy.sh'

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          HEALTH_URL="https://${{ secrets.VPS_HOST }}/api/metrics/health/detailed"
          
          for i in {1..5}; do
            if curl -f -k ${HEALTH_URL} > /dev/null 2>&1; then
              echo "✅ Deployment verified successfully!"
              exit 0
            fi
            echo "Verification attempt $i failed, retrying..."
            sleep 10
          done
          
          echo "❌ Deployment verification failed"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.ssh/known_hosts

      - name: Create deployment summary
        if: always()
        run: |
          COMMIT_SHA=${{ inputs.commit_sha || github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${SHORT_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commit Message" >> $GITHUB_STEP_SUMMARY
          echo "${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Success Notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment succeeded!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Deployment Failure Notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          exit 1
