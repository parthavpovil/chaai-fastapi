# Docker Compose configuration for ChatSaaS Backend production deployment
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg15
    container_name: chatsaas-postgres
    environment:
      POSTGRES_DB: chatsaas_prod
      POSTGRES_USER: chatsaas_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatsaas_user -d chatsaas_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatsaas-network

  # Redis â€” arq job queue, pub/sub, and cache. Used by every service.
  redis:
    image: redis:7-alpine
    container_name: chatsaas-redis
    # `maxmemory` is set ~80MB below the container limit so Redis evicts/fails
    # before the kernel OOM-kills it. `noeviction` makes writes fail loudly
    # rather than silently dropping queued jobs or pub/sub data.
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 432mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatsaas-network

  # ChatSaaS Backend Application
  backend:
    image: chatsaas-backend:latest
    container_name: chatsaas-backend
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
      - APP_URL=${APP_URL}
      - AI_PROVIDER=openai
      - EMBEDDING_PROVIDER=openai
      - DATABASE_URL=postgresql+asyncpg://chatsaas_user:${POSTGRES_PASSWORD}@postgres:5432/chatsaas_prod
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PROCESS_SECRET=${PROCESS_SECRET}
      - STORAGE_PATH=/var/chatsaas/storage
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - TELEGRAM_SECRET_TOKEN=${TELEGRAM_SECRET_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RAZORPAY_PLAN_STARTER=${RAZORPAY_PLAN_STARTER}
      - RAZORPAY_PLAN_GROWTH=${RAZORPAY_PLAN_GROWTH}
      - RAZORPAY_PLAN_PRO=${RAZORPAY_PLAN_PRO}
    volumes:
      - storage_data:/var/chatsaas/storage
      - ./logs:/var/log/chatsaas
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1280m  # ~416 MB per Gunicorn worker across 3 workers
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - chatsaas-network

  # Message processing worker â€” paid tenants (starter / growth / pro)
  message-worker-paid:
    image: chatsaas-backend:latest
    container_name: chatsaas-message-worker-paid
    command: ["arq", "app.tasks.message_tasks.PaidMessageWorkerSettings"]
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
      - APP_URL=${APP_URL}
      - AI_PROVIDER=openai
      - EMBEDDING_PROVIDER=openai
      - DATABASE_URL=postgresql+asyncpg://chatsaas_user:${POSTGRES_PASSWORD}@postgres:5432/chatsaas_prod
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PROCESS_SECRET=${PROCESS_SECRET}
      - STORAGE_PATH=/var/chatsaas/storage
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - TELEGRAM_SECRET_TOKEN=${TELEGRAM_SECRET_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RAZORPAY_PLAN_STARTER=${RAZORPAY_PLAN_STARTER}
      - RAZORPAY_PLAN_GROWTH=${RAZORPAY_PLAN_GROWTH}
      - RAZORPAY_PLAN_PRO=${RAZORPAY_PLAN_PRO}
    volumes:
      - storage_data:/var/chatsaas/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500m
          cpus: "1.5"
    networks:
      - chatsaas-network

  # Message processing worker â€” free-tier workspaces (isolated from paid queue)
  message-worker-free:
    image: chatsaas-backend:latest
    container_name: chatsaas-message-worker-free
    command: ["arq", "app.tasks.message_tasks.FreeMessageWorkerSettings"]
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
      - APP_URL=${APP_URL}
      - AI_PROVIDER=openai
      - EMBEDDING_PROVIDER=openai
      - DATABASE_URL=postgresql+asyncpg://chatsaas_user:${POSTGRES_PASSWORD}@postgres:5432/chatsaas_prod
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PROCESS_SECRET=${PROCESS_SECRET}
      - STORAGE_PATH=/var/chatsaas/storage
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - TELEGRAM_SECRET_TOKEN=${TELEGRAM_SECRET_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_DOMAIN=${R2_PUBLIC_DOMAIN}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RAZORPAY_PLAN_STARTER=${RAZORPAY_PLAN_STARTER}
      - RAZORPAY_PLAN_GROWTH=${RAZORPAY_PLAN_GROWTH}
      - RAZORPAY_PLAN_PRO=${RAZORPAY_PLAN_PRO}
    volumes:
      - storage_data:/var/chatsaas/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks:
      - chatsaas-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: chatsaas-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl:ro
      - ./static:/var/chatsaas/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chatsaas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local

networks:
  chatsaas-network:
    driver: bridge