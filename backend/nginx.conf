limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream backend {
    server 127.0.0.1:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name parthavpovil.in api.parthavpovil.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS for API subdomain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.parthavpovil.in;

    ssl_certificate /etc/letsencrypt/live/api.parthavpovil.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.parthavpovil.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 50M;  # document uploads can exceed 10 MB
    proxy_connect_timeout 10s;
    proxy_send_timeout    125s;
    proxy_read_timeout    125s;

    access_log /var/log/nginx/api.parthavpovil.in.access.log;
    error_log /var/log/nginx/api.parthavpovil.in.error.log;

    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        # CORS headers on all responses including proxy errors
        add_header 'Access-Control-Allow-Origin' 'https://chatsaas.vercel.app' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Handle OPTIONS preflight without hitting the backend
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://chatsaas.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_request_buffering off;
        # proxy_buffering is intentionally left ON (default) to protect against
        # slow-loris. Add a dedicated location block with proxy_buffering off
        # when SSE/streaming endpoints are introduced.
    }
}

# HTTPS for main domain → redirect to API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parthavpovil.in;

    ssl_certificate /etc/letsencrypt/live/api.parthavpovil.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.parthavpovil.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 301 https://api.parthavpovil.in$request_uri;
    }
}
