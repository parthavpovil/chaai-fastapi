[tool:pytest]
asyncio_mode = auto
testpaths = tests

[coverage:run]
source = app
omit =
    app/migrations/*
    app/alembic/*
    */tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
